<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Countdown to 1 April 2029</title>

        <style>
            * {
                  margin: 0;
                        padding: 0;
                              box-sizing: border-box;
                                    font-family: Arial, Helvetica, sans-serif;
                                        }

                                            body {
                                                  height: 100vh;
                                                        display: flex;
                                                              justify-content: center;
                                                                    align-items: center;
                                                                          background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
                                                                                color: white;
                                                                                      overflow: hidden;
                                                                                          }

                                                                                              .container {
                                                                                                    text-align: center;
                                                                                                          padding: 40px;
                                                                                                                border-radius: 24px;
                                                                                                                      background: rgba(255, 255, 255, 0.08);
                                                                                                                            backdrop-filter: blur(12px);
                                                                                                                                  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                                                                                                                                        width: 90%;
                                                                                                                                              max-width: 900px;
                                                                                                                                                  }

                                                                                                                                                      h1 {
                                                                                                                                                            font-size: 3rem;
                                                                                                                                                                  margin-bottom: 10px;
                                                                                                                                                                        letter-spacing: 1px;
                                                                                                                                                                            }

                                                                                                                                                                                .subtitle {
                                                                                                                                                                                      font-size: 1.1rem;
                                                                                                                                                                                            opacity: 0.8;
                                                                                                                                                                                                  margin-bottom: 40px;
                                                                                                                                                                                                      }

                                                                                                                                                                                                          .countdown {
                                                                                                                                                                                                                display: grid;
                                                                                                                                                                                                                      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                                                                                                                                                                                                                            gap: 20px;
                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                    .time-box {
                                                                                                                                                                                                                                          background: rgba(255,255,255,0.1);
                                                                                                                                                                                                                                                padding: 25px 15px;
                                                                                                                                                                                                                                                      border-radius: 18px;
                                                                                                                                                                                                                                                            transition: transform 0.2s ease;
                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                    .time-box:hover {
                                                                                                                                                                                                                                                                          transform: translateY(-5px);
                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                  .number {
                                                                                                                                                                                                                                                                                        font-size: 3rem;
                                                                                                                                                                                                                                                                                              font-weight: bold;
                                                                                                                                                                                                                                                                                                    margin-bottom: 10px;
                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                            .label {
                                                                                                                                                                                                                                                                                                                  font-size: 1rem;
                                                                                                                                                                                                                                                                                                                        text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                              letter-spacing: 2px;
                                                                                                                                                                                                                                                                                                                                    opacity: 0.75;
                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                            .finished {
                                                                                                                                                                                                                                                                                                                                                  font-size: 2rem;
                                                                                                                                                                                                                                                                                                                                                        color: #22c55e;
                                                                                                                                                                                                                                                                                                                                                              font-weight: bold;
                                                                                                                                                                                                                                                                                                                                                                    margin-top: 20px;
                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                            @media (max-width: 600px) {
                                                                                                                                                                                                                                                                                                                                                                                  h1 {
                                                                                                                                                                                                                                                                                                                                                                                          font-size: 2rem;
                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                      .number {
                                                                                                                                                                                                                                                                                                                                                                                                              font-size: 2.2rem;
                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                                                                                                                                                                          </head>
                                                                                                                                                                                                                                                                                                                                                                                                                          <body>

                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="container">
                                                                                                                                                                                                                                                                                                                                                                                                                                <h1>Countdown to 1 April 2029</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="subtitle">The clock is ticking...</p>

                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="countdown">
                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="time-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="number" id="days">0</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="label">Days</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="time-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="number" id="hours">0</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="label">Hours</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="time-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="number" id="minutes">0</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="label">Minutes</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="time-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="number" id="seconds">0</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="label">Seconds</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="finishedMessage" class="finished" style="display:none;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      🎉 The countdown has ended!
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  // Target date: 1 April 2029
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const targetDate = new Date("April 1, 2029 00:00:00").getTime();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function updateCountdown() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const now = new Date().getTime();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const distance = targetDate - now;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Countdown finished
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (distance <= 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.querySelector(".countdown").style.display = "none";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById("finishedMessage").style.display = "block";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      // Time calculations
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Update HTML
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById("days").innerText = days;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById("hours").innerText = hours;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById("minutes").innerText = minutes;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById("seconds").innerText = seconds;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Run immediately
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        updateCountdown();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Update every second
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setInterval(updateCountdown, 1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </html>
